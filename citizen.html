<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Traffic Light Reporter</title>
    
    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; background: #e9ecef; }
        
        /* The Map */
        #map { width: 100vw; height: 100vh; z-index: 1; }
        
        /* Cursor pointer for vector circles */
        .tl-vector-marker { cursor: pointer; }
        
        /* Map Legend */
        .map-legend {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 12px 16px;
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            font-size: 14px; font-weight: 600; color: #333;
            display: flex; flex-direction: column; gap: 8px;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-dot { font-size: 18px; line-height: 1; }

        /* Bottom Slide-Up Sheet */
        .bottom-sheet {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #ffffff;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            z-index: 1000;
            transform: translateY(120%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 -10px 25px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        .bottom-sheet.active { transform: translateY(0); }
        
        .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .sheet-title { margin: 0; font-size: 20px; color: #1a1a1a; }
        .sheet-subtitle { margin: 4px 0 0 0; font-size: 14px; color: #666; }
        .close-btn { background: #f0f2f5; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 16px; cursor: pointer; }
        
        /* Big, Driver-Friendly Buttons */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .report-btn {
            background: #f8f9fa; border: 2px solid #e9ecef; border-radius: 16px;
            padding: 16px 8px; font-size: 14px; font-weight: 600; color: #333;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            cursor: pointer; transition: all 0.2s;
        }
        .report-btn .emoji { font-size: 28px; }
        .report-btn:active, .report-btn:hover { background: #e9ecef; transform: scale(0.96); }
        
        /* Specific Button Colors on Active/Hover */
        .btn-power:active, .btn-power:hover { border-color: #343a40; background: #e9ecef; }
        .btn-theft:active, .btn-theft:hover { border-color: #dc3545; background: #f8d7da; color: #dc3545; }
        .btn-crash:active, .btn-crash:hover { border-color: #fd7e14; background: #ffe8d6; color: #fd7e14; }
        .btn-sync:active, .btn-sync:hover  { border-color: #ffc107; background: #fff3cd; color: #b08103; }

        /* Success Notification Toast */
        .toast {
            position: fixed; top: 40px; left: 50%; transform: translate(-50%, -150px);
            background: #28a745; color: white; padding: 16px 32px;
            border-radius: 30px; font-weight: bold; font-size: 16px;
            z-index: 2000; box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            white-space: nowrap;
        }
        .toast.show { transform: translate(-50%, 0); }
        
        /* Back Button */
        .back-btn {
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            background: #fff; border-radius: 50%; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); text-decoration: none; font-size: 20px;
        }

        /* Locate Button */
        .locate-btn {
            position: absolute; top: 65px; right: 15px; z-index: 1000;
            background: #fff; border: none; border-radius: 50%; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); font-size: 20px; cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }
        .locate-btn:active { background: #f0f0f0; transform: scale(0.95); }
        .locate-btn.loading { animation: pulse 1s infinite alternate; }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.7; }
        }

        /* Automatic Dark Mode */
        @media (prefers-color-scheme: dark) {
            body { background: #121212; color: #e0e0e0; }
            .leaflet-tile-pane { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
            .bottom-sheet { background: #1a1a1a; box-shadow: 0 -10px 25px rgba(0,0,0,0.5); }
            .sheet-title { color: #f8f9fa; }
            .sheet-subtitle { color: #aaa; }
            .report-btn { background: #2c2c2c; border-color: #444; color: #f8f9fa; }
            .report-btn:active, .report-btn:hover { background: #3c3c3c; border-color: #555; }
            .map-legend { background: rgba(30, 30, 30, 0.95); color: #f8f9fa; }
            .close-btn { background: #333; color: #f8f9fa; }
            .back-btn { background: #1a1a1a; }
            .locate-btn { background: #1a1a1a; }
            .filter-bar { background: rgba(30, 30, 30, 0.95); }
            .filter-btn { color: #aaa; }
            .filter-btn.active { background: #333; color: #f8f9fa; }
        }

        /* Filter Bar */
        .filter-bar {
            position: absolute; top: 150px; left: 15px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 4px;
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            display: flex; flex-direction: column; gap: 4px; width: 150px;
        }
        .filter-btn {
            background: transparent; border: none; padding: 10px 12px;
            border-radius: 8px; font-weight: 600; font-size: 13px;
            color: #666; cursor: pointer; transition: all 0.2s;
            text-align: left;
        }
        .filter-btn.active {
            background: #e9ecef; color: #1a1a1a; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <!-- The Map -->
    <div id="map"></div>

    <!-- Filter Bar (Top Center) -->
    <div class="filter-bar">
        <button id="filter-all" class="filter-btn active" onclick="setFilter('all')">All Lights</button>
        <button id="filter-issues" class="filter-btn" onclick="setFilter('issues')">Issues Only ⚠️</button>
    </div>

    <!-- Map Legend -->
    <div class="map-legend">
        <div class="legend-item"><span class="legend-dot">🟢</span> Normal / Online</div>
        <div class="legend-item"><span class="legend-dot">🔴</span> Issue Reported</div>
        <div class="legend-item"><span class="legend-dot">🟠</span> In Progress</div>
        <div class="legend-item"><span class="legend-dot">🔵</span> You</div>
    </div>
    
    <a href="index.html" class="back-btn">🏠</a>
    <button class="locate-btn" onclick="locateUser()" title="Find My Location">📍</button>

    <!-- Success Toast -->
    <div id="toast" class="toast">Report Sent! ✅</div>

    <!-- Bottom Action Sheet -->
    <div id="bottom-sheet" class="bottom-sheet">
        <div class="sheet-header">
            <div>
                <h3 class="sheet-title" id="intersection-name">Sandton Drive & Rivonia Rd</h3>
                <p class="sheet-subtitle" id="intersection-subtitle">What is the issue at this intersection?</p>
            </div>
            <button class="close-btn" onclick="closeSheet()">✕</button>
        </div>

        <!-- Normal Reporting Buttons -->
        <div class="btn-grid" id="report-grid">
            <button class="report-btn btn-power" onclick="submitReport('Power Cut')">
                <span class="emoji">🔌</span> Power Out
            </button>
            <button class="report-btn btn-theft" onclick="submitReport('Cable Theft')">
                <span class="emoji">✂️</span> Cable Theft
            </button>
            <button class="report-btn btn-crash" onclick="submitReport('Accident')">
                <span class="emoji">💥</span> Accident
            </button>
            <button class="report-btn btn-sync" onclick="submitReport('Out of Sync')">
                <span class="emoji">🚦</span> Flashing Red
            </button>
        </div>

        <!-- Confirmation Button (For already reported lights) -->
        <div class="btn-grid" id="confirm-grid" style="display: none; grid-template-columns: 1fr;">
            <button class="report-btn btn-sync" onclick="submitReport('Confirm')" style="padding: 24px; font-size: 18px;">
                <span class="emoji">👍</span> I See This Too
            </button>
        </div>
    </div>

    <!-- Supabase and Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase Initialization
        const supabaseUrl = 'https://zqumonwgogduccorkbhp.supabase.co';
        const supabaseKey = 'sb_publishable_c5HmmGQbDnnawu6fU1Vkog_3-L-wl_J';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        // Initialize Map centered on Sandton, JHB (preferCanvas drastically improves performance for many markers)
        const map = L.map('map', { zoomControl: false, preferCanvas: true }).setView([-26.107567, 28.056702], 15);
        
        // Load OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        let activeMarker = null;
        let activeLightId = null;
        let allMarkers = []; // Store references to all markers
        let currentFilter = 'all';

        // Set map filter
        function setFilter(filterType) {
            currentFilter = filterType;
            
            // Update UI
            document.getElementById('filter-all').classList.toggle('active', filterType === 'all');
            document.getElementById('filter-issues').classList.toggle('active', filterType === 'issues');

            // Apply filter to markers
            allMarkers.forEach(item => {
                if (filterType === 'issues' && item.isOnline) {
                    map.removeLayer(item.marker); // Hide healthy lights
                } else {
                    if (!map.hasLayer(item.marker)) {
                        map.addLayer(item.marker); // Show all others
                    }
                }
            });
        }

        // Load traffic lights from Supabase
        async function loadIntersections() {
            const { data: intersections, error } = await supabaseClient.from('traffic_lights').select('*');
            if (error) {
                console.error('Error fetching traffic lights:', error);
                return;
            }

            intersections.forEach(loc => {
                const isOnline = loc.status === 'online';
                const isInProgress = loc.status === 'in_progress';
                
                // Determine color and size (make issues slightly larger to stand out more)
                let dotColor = '#dc3545'; // Default red
                let radius = 45; // Default radius for issues

                if (isOnline) {
                    dotColor = '#28a745'; // Green
                    radius = 35; // Normal size
                }
                else if (isInProgress) {
                    dotColor = '#fd7e14'; // Orange
                    radius = 45; // Larger
                }
                
                // Using Vector Circles
                const marker = L.circle([loc.lat, loc.lng], {
                    radius: radius, // Size in meters
                    color: '#ffffff', // White border
                    weight: isOnline ? 2 : 3, // Thicker border for issues
                    fillColor: dotColor,
                    fillOpacity: isOnline ? 0.7 : 0.9, // Dim healthy lights slightly
                    className: 'tl-vector-marker'
                }).addTo(map);

                // Save to array for filtering later
                allMarkers.push({ marker, isOnline, loc });
                
                // When a driver taps a traffic light
                marker.on('click', () => {
                    activeMarker = marker; // Remember which one they tapped
                    activeLightId = loc.id; // Remember the database ID
                    
                    // Pan map slightly up so the bottom sheet doesn't cover the pin
                    map.flyTo([loc.lat - 0.003, loc.lng], 16, { duration: 0.5 });
                    
                    document.getElementById('intersection-name').innerText = loc.name;
                    const subtitleEl = document.getElementById('intersection-subtitle');
                    const reportGrid = document.getElementById('report-grid');
                    const confirmGrid = document.getElementById('confirm-grid');

                    if (isOnline) {
                        // Healthy Light -> Show reporting options
                        subtitleEl.innerText = "What is the issue at this intersection?";
                        reportGrid.style.display = "grid";
                        confirmGrid.style.display = "none";
                    } else {
                        // Reported/In-Progress Light -> Show "I See This Too"
                        let timeAgoText = "recently";
                        if (loc.last_updated) {
                            const updatedDate = new Date(loc.last_updated);
                            const mins = Math.floor((new Date() - updatedDate) / 60000);
                            if (mins < 60) timeAgoText = `${mins} mins ago`;
                            else if (mins < 1440) timeAgoText = `${Math.floor(mins / 60)} hrs ago`;
                            else timeAgoText = `${Math.floor(mins / 1440)} days ago`;
                        }
                        
                        let displayStatus = loc.status === 'in_progress' ? 'Technician Dispatched' : loc.status;
                        subtitleEl.innerHTML = `<strong>Status:</strong> ${displayStatus} (Reported ${timeAgoText})`;
                        
                        reportGrid.style.display = "none";
                        confirmGrid.style.display = "grid";
                    }

                    // Show the bottom sheet
                    document.getElementById('bottom-sheet').classList.add('active');
                });
            });
        }

        // Close the bottom sheet
        function closeSheet() {
            document.getElementById('bottom-sheet').classList.remove('active');
        }

        let userMarker = null;

        // Locate User Function (Requests Permission & Zones In)
        function locateUser() {
            const btn = document.querySelector('.locate-btn');
            
            if (!navigator.geolocation) {
                alert("Geolocation is not supported by your browser");
                return;
            }

            btn.classList.add('loading');
            
            // Ask for location permission and get current position
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    btn.classList.remove('loading');
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    
                    // Fly to location (zones in)
                    map.flyTo([lat, lng], 16, { duration: 1.5 });
                    
                    // Add or update user marker
                    if (userMarker) {
                        userMarker.setLatLng([lat, lng]);
                    } else {
                        // Blue vector circle for user
                        userMarker = L.circle([lat, lng], { 
                            radius: 40,
                            color: '#ffffff',
                            weight: 2,
                            fillColor: '#007bff', // blue
                            fillOpacity: 1,
                            zIndexOffset: 1000,
                            className: 'tl-vector-marker'
                        }).addTo(map).bindPopup("You are here").openPopup();
                    }
                },
                (error) => {
                    btn.classList.remove('loading');
                    let errorMsg = "Could not get your location.";
                    if (error.code === error.PERMISSION_DENIED) {
                        errorMsg = "Location permission denied. Please allow location access in your browser settings to use this feature.";
                    }
                    alert(errorMsg);
                    console.error('Geolocation error:', error);
                },
                {
                    enableHighAccuracy: true, // Use GPS if available
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }

        // Submit the report to Supabase
        async function submitReport(issueType) {
            closeSheet(); // Hide the menu
            
            // Change the vector circle map marker to red to show it's reported
            if(activeMarker) {
                activeMarker.setStyle({ fillColor: '#dc3545' });
            }

            // Show Success Toast
            const toast = document.getElementById('toast');
            toast.innerText = issueType + " Reported! ✅";
            toast.classList.add('show');
            
            // Hide toast after 3 seconds
            setTimeout(() => { toast.classList.remove('show'); }, 3000);

            // Save to database!
            if (activeLightId) {
                // 1. Insert the report
                await supabaseClient.from('reports').insert([
                    { traffic_light_id: activeLightId, issue_type: issueType, status: 'new' }
                ]);

                // 2. Update the traffic light status
                await supabaseClient.from('traffic_lights').update({ status: issueType }).eq('id', activeLightId);
            }
        }

        // Run on load
        loadIntersections();
    </script>
</body>
</html>
