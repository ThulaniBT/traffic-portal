<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Traffic Portal</title>
    <style>
        body, html { 
            margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            height: 100vh; background: #121212; color: #fff; display: flex; align-items: center; justify-content: center; 
        }
        .container { text-align: center; padding: 24px; max-width: 400px; width: 100%; box-sizing: border-box; }
        .logo { font-size: 64px; margin-bottom: 10px; animation: float 3s ease-in-out infinite; }
        h1 { font-size: 28px; margin: 0 0 10px 0; }
        p { color: #aaa; margin: 0 0 40px 0; line-height: 1.5; font-size: 15px; }
        
        .card-container { display: flex; flex-direction: column; gap: 16px; }
        
        .role-card { 
            background: #1e1e1e; border: 1px solid #333; border-radius: 16px; padding: 20px; 
            text-decoration: none; color: #fff; transition: all 0.2s ease-out; 
            display: flex; align-items: center; gap: 20px; text-align: left;
        }
        .role-card:active { transform: scale(0.96); background: #252525; }
        @media (hover: hover) {
            .role-card:hover { border-color: #0b57d0; background: #252525; transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        }
        
        .icon { 
            font-size: 32px; background: #2a2a2a; width: 64px; height: 64px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; 
        }
        .title { font-size: 18px; font-weight: bold; margin: 0 0 4px 0; }
        .desc { font-size: 13px; color: #888; margin: 0; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🚦</div>
        <h1>Smart Traffic Portal</h1>
        <p>Crowdsourced traffic light monitoring and rapid pointsman dispatch.</p>
        
        <div class="card-container">
            <a href="citizen.html" class="role-card">
                <div class="icon">🚗</div>
                <div class="info">
                    <h2 class="title">Citizen / Driver</h2>
                    <p class="desc">Report a broken traffic light near you in just 3 taps.</p>
                </div>
            </a>
            
            <a href="auth.html" class="role-card">
                <div class="icon">🎧</div>
                <div class="info">
                    <h2 class="title">Dispatch Center</h2>
                    <p class="desc">Secure login for dispatch personnel to monitor and manage alerts.</p>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
